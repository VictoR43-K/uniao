<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Uniao Group product administration dashboard.">
    <title>Admin Dashboard | Uniao Group</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="styles.css">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <style>
        .admin-shell { padding: 120px 0 60px; min-height: 100vh; background: var(--bg-gray); }
        .admin-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 24px; }
        .admin-card { background: var(--bg-light); border: 1px solid var(--border-color); border-radius: 16px; padding: 22px; box-shadow: var(--shadow-sm); }
        .admin-card h2 { margin-bottom: 16px; font-size: 1.25rem; }
        .admin-toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
        .admin-list { max-height: 62vh; overflow: auto; border: 1px solid var(--border-color); border-radius: 12px; }
        .admin-row { display: grid; grid-template-columns: 72px 1fr auto; gap: 12px; align-items: center; padding: 10px 12px; border-bottom: 1px solid var(--border-color); }
        .admin-row:last-child { border-bottom: none; }
        .admin-thumb { width: 72px; height: 52px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border-color); }
        .admin-meta h4 { font-size: 0.96rem; margin-bottom: 4px; }
        .admin-meta p { font-size: 0.86rem; color: var(--text-light); }
        .admin-actions { display: flex; gap: 8px; }
        .admin-form .form-group { margin-bottom: 12px; }
        .admin-form .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .admin-form textarea { min-height: 96px; resize: vertical; }
        .admin-preview { margin-top: 10px; border: 1px dashed var(--border-color); border-radius: 10px; padding: 8px; text-align: center; }
        .admin-preview img { max-width: 100%; max-height: 180px; border-radius: 8px; object-fit: cover; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 999px; background: rgba(45,106,79,.12); color: var(--primary-color); font-size: .74rem; font-weight: 700; }
        .auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .auth-box { width: min(420px, 92vw); background: var(--bg-light); border-radius: 16px; padding: 24px; box-shadow: var(--shadow-lg); }
        .auth-box h3 { margin-bottom: 8px; }
        .auth-box p { color: var(--text-light); margin-bottom: 14px; }
        .hidden-admin { display: none !important; }
        @media (max-width: 980px) { .admin-grid { grid-template-columns: 1fr; } .admin-list { max-height: 45vh; } }
    </style>
</head>
<body>
    <nav class="navbar scrolled" id="navbar">
        <div class="container nav-container">
            <div class="logo"><i class="fas fa-leaf"></i><span>UNIAO GROUP ADMIN</span></div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link">Back to Website</a></li>
            </ul>
        </div>
    </nav>

    <section class="admin-shell hidden-admin" id="adminApp">
        <div class="container">
            <div class="admin-grid">
                <div class="admin-card">
                    <h2>Products</h2>
                    <div class="admin-toolbar">
                        <button class="btn btn-outline btn-small" id="refreshListBtn"><i class="fas fa-rotate"></i> Refresh</button>
                        <button class="btn btn-outline btn-small" id="newProductBtn"><i class="fas fa-plus"></i> New Product</button>
                        <button class="btn btn-outline btn-small" id="logoutBtn"><i class="fas fa-right-from-bracket"></i> Logout</button>
                    </div>
                    <div id="catalogStats" class="section-subtitle" style="margin-bottom:12px;"></div>
                    <div class="admin-list" id="productList"></div>
                </div>

                <div class="admin-card">
                    <h2 id="editorTitle">Edit Product</h2>
                    <form class="admin-form" id="productForm">
                        <input type="hidden" id="productId">
                        <div class="form-group">
                            <label for="productName">Product Name *</label>
                            <input id="productName" type="text" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="productCategory">Category *</label>
                                <select id="productCategory" required>
                                    <option value="sisal">Sisal Fiber</option>
                                    <option value="coffee">Coffee & Tea</option>
                                    <option value="grains">Grains</option>
                                    <option value="fruits">Fruits</option>
                                    <option value="nuts">Nuts</option>
                                    <option value="spices">Spices & Herbs</option>
                                    <option value="vegetables">Vegetables</option>
                                    <option value="oils">Essential Oils</option>
                                    <option value="other">Other Products</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="productPrice">Price (optional)</label>
                                <input id="productPrice" type="text" placeholder="e.g. USD 2,450 / MT">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="productDescription">Description *</label>
                            <textarea id="productDescription" required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="productImage">Photo URL *</label>
                            <input id="productImage" type="url" required>
                        </div>
                        <div class="form-group">
                            <label for="productImageAlt">Photo Alt Text *</label>
                            <input id="productImageAlt" type="text" required>
                        </div>
                        <div class="admin-preview" id="imagePreviewBox">
                            <img id="imagePreview" alt="Preview" src="" style="display:none;">
                            <p id="previewText">Image preview will appear here.</p>
                        </div>
                        <div class="admin-toolbar" style="margin-top:14px;">
                            <button class="btn btn-primary" type="submit"><i class="fas fa-floppy-disk"></i> Save Product</button>
                            <button class="btn btn-outline" type="button" id="deleteProductBtn"><i class="fas fa-trash"></i> Delete</button>
                            <button class="btn btn-outline" type="button" id="resetFormBtn"><i class="fas fa-eraser"></i> Clear</button>
                        </div>
                    </form>

                    <hr style="margin:20px 0; border:0; border-top:1px solid var(--border-color);">
                    <h3 style="font-size:1rem; margin-bottom:10px;">Access Control</h3>
                    <p class="section-subtitle" style="margin-bottom:8px;">Change your admin passcode.</p>
                    <form id="passcodeForm" class="admin-form">
                        <div class="form-row">
                            <div class="form-group"><label for="currentPasscode">Current Passcode</label><input id="currentPasscode" type="password" required></div>
                            <div class="form-group"><label for="newPasscode">New Passcode</label><input id="newPasscode" type="password" required></div>
                        </div>
                        <button class="btn btn-outline btn-small" type="submit"><i class="fas fa-key"></i> Update Passcode</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <div class="auth-overlay" id="authOverlay">
        <div class="auth-box">
            <h3>Admin Access</h3>
            <p>Enter your passcode to manage products. This is client-side protection for your device/session.</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="adminPasscode">Passcode</label>
                    <input id="adminPasscode" type="password" required autofocus>
                </div>
                <button class="btn btn-primary" type="submit" style="width:100%;">Unlock Dashboard</button>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
